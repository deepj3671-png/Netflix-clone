<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" class="nav_logo" alt="Netflix Logo">
        <button class="nav_button">Sign In</button>
    </nav>

    <header class="banner">
        <div class="banner_contents">
            <h1 class="banner_title">Stranger Things</h1>
            <div class="banner_buttons">
                <button class="banner_button">Play</button>
                <button class="banner_button">My List</button>
            </div>
            <p class="banner_description">
                When a young boy vanishes, a small town uncovers a mystery involving secret experiments and terrifying supernatural forces.
            </p>
        </div>
        <div class="banner_fadeBottom"></div>
    </header>

    <div class="row">
        <h2>NETFLIX ORIGINALS</h2>
        <div class="row_posters">
            <img src="https://image.tmdb.org/p/w500/rn97pS987Y69ipN66S7899fS06U.jpg" alt="Poster" class="row_poster row_posterLarge">
            <img src="https://image.tmdb.org/p/w500/8Yv979GZp8m9pS987Y69ipN66S.jpg" alt="Poster" class="row_poster row_posterLarge">
            <img src="https://image.tmdb.org/p/w500/49W97pS987Y69ipN66S7899fS06U.jpg" alt="Poster" class="row_poster row_posterLarge">
            <img src="https://image.tmdb.org/p/w500/3937z7Y69ipN66S7899fS06U.jpg" alt="Poster" class="row_poster row_posterLarge">
        </div>
    </div>

    <div class="row">
        <h2>Trending Now</h2>
        <div class="row_posters">
            <img src="https://image.tmdb.org/p/w500/f899fS06Urn97pS987Y69ipN66S.jpg" alt="Poster" class="row_poster">
            <img src="https://image.tmdb.org/p/w500/w97pS987Y69ipN66S7899fS06Urn.jpg" alt="Poster" class="row_poster">
            <img src="https://image.tmdb.org/p/w500/pS987Y69ipN66S7899fS06Urn97.jpg" alt="Poster" class="row_poster">
            <img src="https://image.tmdb.org/p/w500/7899fS06Urn97pS987Y69ipN66S.jpg" alt="Poster" class="row_poster">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
